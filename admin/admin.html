<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Page | Sarab</title>
    <link rel="icon" type="image/png" href="../img/LOGO.png" />
    <link rel="stylesheet" href="admin.css" />
    <style>
      /* تحسينات بسيطة للشكل */
      .hidden-fade { display: none; }
      .checkbox-group {
        margin: 15px 0;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        background: #1a1a1a;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #333;
      }
      .check-item { display: flex; align-items: center; gap: 10px; cursor: pointer; }
      .check-item input { width: 18px; height: 18px; accent-color: #e30613; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <header>
        <h1>إدارة منتجات "سراب"</h1>
        <p>أهلاً بك يا مستر عبد الرحمن في لوحة تحكم Qovox</p>
      </header>

      <section class="admin-panel">
        <div class="panel-header">
          <h2>إضافة منتج جديد</h2>
          <p>تحكم في أماكن العرض، الأسعار، والخصومات من مكان واحد.</p>
        </div>

        <form id="productForm" class="qovox-form">
          <div class="form-group">
            <label>اسم المنتج</label>
            <input type="text" id="prodName" placeholder="مثلاً: عود القصر الملكي" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>السعر الأصلي (ج.م)</label>
              <input type="number" id="prodPrice" placeholder="0.00" required />
            </div>
            <div class="form-group">
              <label>هل يوجد خصم؟</label>
              <select id="hasDiscount">
                <option value="no">لا يوجد</option>
                <option value="yes">نعم، يوجد خصم</option>
              </select>
            </div>
          </div>

          <div id="discountSection" class="form-group hidden-fade">
            <label>نسبة الخصم (%)</label>
            <input type="number" id="prodDiscount" placeholder="مثلاً: 20" min="0" max="100" value="0" />
            <small id="pricePreview"></small>
          </div>

          <div class="form-group">
            <label>أماكن عرض المنتج</label>
            <div class="checkbox-group">
              <div class="check-item">
                <input type="checkbox" id="showInStore" checked />
                <label for="showInStore" style="color: #fff; cursor: pointer">عرض في المتجر الأساسي</label>
              </div>
              <div class="check-item">
                <input type="checkbox" id="showInOffers" />
                <label for="showInOffers" style="color: #fff; cursor: pointer">إضافة للعروض الحصرية ✨</label>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>حالة التوفر</label>
              <select id="prodStatus">
                <option value="true">متوفر حالياً ✅</option>
                <option value="false">نفذت الكمية ❌</option>
              </select>
            </div>
            <div class="form-group">
              <label>الكمية المتاحة (المخزون)</label>
              <input type="number" id="prodStock" placeholder="مثلاً: 50" value="0" />
            </div>
          </div>

          <div class="form-group">
            <label>صورة المنتج</label>
            <div class="file-upload-wrapper" style="position: relative; background: #151515; border: 2px dashed #333; padding: 20px; text-align: center; border-radius: 8px;">
              <input type="file" id="prodImage" accept="image/*" style="opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; left: 0; top: 0;" />
              <div class="upload-design">
                <i class="upload-icon">📷</i>
                <span>اضغط هنا لاختيار صورة العطر</span>
              </div>
            </div>
          </div>

          <div id="statusMessage" style="margin: 15px 0; font-weight: bold; text-align: center;"></div>

          <button type="submit" id="addBtn" class="submit-btn">
            إضافة المنتج  🚀
          </button>
        </form>
      </section>

      <section class="manage-products">
        <div class="panel-header">
          <br />
          <h2>إدارة المنتجات الحالية</h2>
          <p>هنا يمكنك تعديل تفاصيل العطور أو حذفها نهائياً.</p>
        </div>
        <div id="admin-products-list" class="admin-grid"></div>
      </section>
    </div>

    <script type="module" src="admin.js"></script>
  </body>
</html>
