<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../img/LOGO.png" />
    <link rel="apple-touch-icon" href="../img/LOGO.png" />
    <title>Sarab | Login</title>

    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="luxury-bg-wrapper">
      <div class="black-fabric-texture"></div>
      <div class="glass-overlay"></div>
    </div>

    <main class="login-container">
      <div class="brand-header">
        <img src="../img/sarasb.jpg" alt="Sarab Logo" class="brand-logo-ar" />
      </div>

      <div class="login-box-glass">
        <form>
          <div class="input-container">
            <label>Email</label>
            <input
              type="email"
              id="email"
              placeholder="example@sarab.com"
              required
            />
          </div>

          <div class="input-container">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="كلمة المرور"
              required
            />
          </div>

          <button type="submit" id="loginBtn" class="login-btn-burgundy">
            Log In
          </button>
        </form>

        <div class="login-box-footer">
          <a href="../sign up/sign.html">Register</a>
          <a href="#">Forgot Password?</a>
        </div>
      </div>

      <div class="decorative-sparkle">
        <img src="../img/sarasb.jpg" alt="Decoration" />
      </div>
    </main>
    <a href="../index.html" class="back-home-btn">
      <i class="fas fa-chevron-right"></i> <span>الرئيسية</span>
    </a>
    <script type="module" src="login.js"></script>
  </body>
</html>
