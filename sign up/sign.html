<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../img/LOGO.png" />
    <link rel="apple-touch-icon" href="../img/LOGO.png" />
    <title>Sarab | Join Us</title>

    <link rel="stylesheet" href="sign.css" />
  </head>
  <body>
    <div class="luxury-bg-wrapper">
      <div id="perfume-fluid"></div>
      <div class="black-fabric-texture"></div>
      <div class="glass-overlay"></div>
    </div>

    <main class="login-container">
      <div class="login-box-glass">
        <div class="brand-header">
          <img src="../img/sarasb.jpg" alt="Sarab Logo" class="brand-logo-ar" />
        </div>

        <form id="signUpForm">
          <div class="form-row">
            <div class="input-container">
              <label>الاسم بالكامل</label>
              <input
                type="text"
                id="fullName"
                placeholder="مثال : أحمد محمد علي"
                required
              />
            </div>
            <div class="input-container">
              <label>رقم الهاتف</label>
              <input
                type="tel"
                id="backupPhone"
                placeholder="01xxxxxxxxx"
                required
              />
            </div>
          </div>

          <div class="input-container">
            <label>البريد الإلكتروني</label>
            <input
              type="email"
              id="registerEmail"
              placeholder="example@sarab.com"
              required
            />
          </div>

          <div class="input-container">
            <label>عنوان التوصيل بالتفصيل</label>
            <input
              type="text"
              id="address"
              placeholder="المحافظة، المدينة، الشارع، المبنى"
              required
            />
          </div>

          <div class="password-row">
            <div class="input-container">
              <label>Password</label>
              <input type="password" id="registerPassword" required />
            </div>

            <div class="input-container">
              <label>Confirm</label>
              <input type="password" id="confirmPassword" required />
            </div>
          </div>

          <div class="terms-container">
            <input type="checkbox" id="termsAgree" required />
            <label for="termsAgree">
              أوافق على <a href="#">الشروط والأحكام</a> الخاصة بـ "سراب"
            </label>
          </div>

          <button type="submit" id="signUpBtn" class="login-btn-burgundy">
            انضم إلينا الآن
          </button>
        </form>
      </div>
    </main>
    <a href="../index.html" class="back-home-btn">
      <i class="fas fa-chevron-right"></i> <span>الرئيسية</span>
    </a>
    <script type="module" src="sign.js"></script>
  </body>
</html>
